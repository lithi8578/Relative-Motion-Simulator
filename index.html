<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雙質點相對運動 - 飛行觀察員模擬器</title>
    <style>
        :root {
            --panel-bg: #1e1e1e;
            --accent: #00d4ff;
            --danger: #e74c3c;
            --text: #e0e0e0;
            --btn-bg: #333;
        }
        * { touch-action: manipulation; } /* 減少延遲 */
        body { margin: 0; display: flex; font-family: 'Segoe UI', system-ui, sans-serif; background: #000; color: var(--text); height: 100vh; overflow: hidden; }
        
        #sidebar { 
            width: 320px; padding: 20px; background: var(--panel-bg); 
            display: flex; flex-direction: column; height: 100%; box-sizing: border-box;
            border-right: 1px solid #333; z-index: 10;
        }
        @media (max-width: 768px) {
            #sidebar { width: 250px; padding: 10px; font-size: 14px; }
            h3 { font-size: 1em; }
        }

        .scroll-area { flex-grow: 1; overflow-y: auto; padding-right: 8px; }
        .group { border: 1px solid #444; padding: 12px; margin-bottom: 15px; border-radius: 8px; background: #262626; }
        
        h3 { margin: 0 0 12px 0; color: var(--accent); border-bottom: 1px solid #444; padding-bottom: 6px; }
        .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        label { font-size: 12px; color: #aaa; }
        
        input[type="number"] { 
            width: 55px; background: #111; border: 1px solid #555; color: var(--accent); 
            padding: 4px; border-radius: 4px; font-family: monospace;
        }
        
        select, #resetBtn { width: 100%; padding: 12px; cursor: pointer; border-radius: 6px; border: none; font-size: 14px; margin-top: 10px; }
        select { background: #444; color: white; }
        #resetBtn { background: var(--danger); color: white; font-weight: bold; margin-top: auto; }

        #viewport { position: relative; flex-grow: 1; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }

        /* 飛行控制儀表板 - 針對觸控加大 */
        #flight-deck {
            position: absolute; bottom: 30px; right: 30px;
            width: 170px; height: 280px;
            background: rgba(30, 30, 30, 0.9);
            border: 2px solid var(--accent);
            border-radius: 20px;
            display: flex; flex-direction: column; align-items: center;
            padding: 15px; box-shadow: 0 0 30px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            user-select: none;
        }
        .deck-section { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        
        .joystick-area {
            width: 100px; height: 100px;
            background: #000; border-radius: 50%;
            border: 2px solid #444; position: relative;
            display: flex; align-items: center; justify-content: center;
            touch-action: none; /* 禁用瀏覽器默認手勢以便處理觸控 */
        }
        .joystick-handle {
            width: 35px; height: 35px;
            background: var(--accent); border-radius: 50%;
            box-shadow: 0 0 15px var(--accent);
            position: relative;
            z-index: 2;
        }
        
        .deck-row { display: flex; width: 100%; justify-content: space-between; gap: 8px; margin-top: 5px; }
        .deck-btn {
            flex: 1; height: 40px; background: var(--btn-bg); border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 12px; font-weight: bold; color: #fff;
            border: 1px solid #444;
        }
        .deck-btn.active { background: var(--accent); color: #000; border-color: #fff; }

        .deck-label { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; font-weight: bold; }

        #mode-tag {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); padding: 8px 18px;
            border-radius: 20px; border: 1px solid var(--accent);
            font-size: 14px; color: #fff;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="scroll-area">
        <h3>環境設定</h3>
        <label>觀察模式</label>
        <select id="viewMode">
            <option value="absolute">地面固定座標系</option>
            <option value="drone">空拍機動態觀測</option>
        </select>

        <div class="input-row" style="margin-top: 15px;">
            <label>時間流速</label>
            <input type="number" id="timeScale" value="1.0" step="0.1">
        </div>

        <div class="group">
            <h3 style="color: #ff4444;">質點 A</h3>
            <div class="input-row"><label>初位 X, Y</label><span><input type="number" id="ax" value="-300"> <input type="number" id="ay" value="0"></span></div>
            <div class="input-row"><label>初速 Vx, Vy</label><span><input type="number" id="avx" value="-20"> <input type="number" id="avy" value="0"></span></div>
            <div class="input-row"><label>加速 Ax, Ay</label><span><input type="number" id="aax" value="5"> <input type="number" id="aay" value="0"></span></div>
        </div>

        <div class="group">
            <h3 style="color: #44ff44;">質點 B</h3>
            <div class="input-row"><label>初位 X, Y</label><span><input type="number" id="bx" value="200"> <input type="number" id="by" value="0"></span></div>
            <div class="input-row"><label>初速 Vx, Vy</label><span><input type="number" id="bvx" value="30"> <input type="number" id="bvy" value="0"></span></div>
            <div class="input-row"><label>加速 Ax, Ay</label><span><input type="number" id="bax" value="-5"> <input type="number" id="bay" value="0"></span></div>
        </div>
    </div>
    <button id="resetBtn">重置模擬系統</button>
</div>

<div id="viewport">
    <div id="mode-tag">模式：地面固定座標系</div>
    <canvas id="canvas"></canvas>

    <div id="flight-deck">
        <div class="deck-section">
            <span class="deck-label">Manual Velocity</span>
            <div class="joystick-area" id="joyArea">
                <div class="joystick-handle" id="joyHandle"></div>
            </div>
        </div>

        <div class="deck-section">
            <span class="deck-label">Sync Lock</span>
            <div class="deck-row">
                <div class="deck-btn" id="lockA">Lock A</div>
                <div class="deck-btn" id="lockB">Lock B</div>
            </div>
        </div>

        <div class="deck-section" style="margin-bottom: 0;">
            <span class="deck-label">Altitude</span>
            <div class="deck-row">
                <div class="deck-btn" id="zoomOut">−</div>
                <div class="deck-btn" id="zoomIn">+</div>
            </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const gui = {};

const ids = ['ax','ay','avx','avy','aax','aay','bx','by','bvx','bvy','bax','bay','timeScale','viewMode','resetBtn'];
ids.forEach(id => gui[id] = document.getElementById(id));

let zoom = 1.0;
let droneV = { x: 0, y: 0 };
let dronePos = { x: 0, y: 0 };
let isDragging = false;
let syncTarget = null; 

const SPEED_MULTIPLIER = 6; 
const JOYSTICK_LIMIT = 45; 

class Particle {
    constructor(color, prefix) {
        this.color = color;
        this.prefix = prefix;
        this.reset();
    }
    reset() {
        this.p0 = { x: parseFloat(gui[this.prefix+'x'].value)||0, y: parseFloat(gui[this.prefix+'y'].value)||0 };
        this.v0 = { x: parseFloat(gui[this.prefix+'vx'].value)||0, y: parseFloat(gui[this.prefix+'vy'].value)||0 };
        this.acc = { x: parseFloat(gui[this.prefix+'ax'].value)||0, y: parseFloat(gui[this.prefix+'ay'].value)||0 };
        this.pos = { ...this.p0 };
        this.vel = { ...this.v0 };
        this.path = [];
        this.t = 0;
    }
    update(dt) {
        this.t += dt;
        this.pos.x = this.p0.x + this.v0.x * this.t + 0.5 * this.acc.x * this.t**2;
        this.pos.y = this.p0.y + this.v0.y * this.t + 0.5 * this.acc.y * this.t**2;
        this.vel.x = this.v0.x + this.acc.x * this.t;
        this.vel.y = this.v0.y + this.acc.y * this.t;
        
        this.path.push({ x: this.pos.x, y: this.pos.y, t: this.t });
        if (this.path.length > 800) this.path.shift();
    }
}

let pA = new Particle('#ff4444', 'a');
let pB = new Particle('#44ff44', 'b');

const joyHandle = document.getElementById('joyHandle');
const joyArea = document.getElementById('joyArea');
const modeTag = document.getElementById('mode-tag');

function updateJoystickUI(vx, vy) {
    let dx = vx / SPEED_MULTIPLIER;
    let dy = vy / SPEED_MULTIPLIER;
    const dist = Math.hypot(dx, dy);
    if (dist > JOYSTICK_LIMIT) {
        dx *= JOYSTICK_LIMIT / dist;
        dy *= JOYSTICK_LIMIT / dist;
    }
    joyHandle.style.transform = `translate(${dx}px, ${dy}px)`;
}

// 同時處理滑鼠與觸控
const startDrag = (e) => {
    isDragging = true;
    syncTarget = null;
    document.getElementById('lockA').classList.remove('active');
    document.getElementById('lockB').classList.remove('active');
    handleDrag(e);
};

const handleDrag = (e) => {
    if (!isDragging) return;
    const rect = joyArea.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    
    // 獲取坐標（相容滑鼠與單點觸控）
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    let dx = clientX - centerX;
    let dy = clientY - centerY;
    
    const dist = Math.hypot(dx, dy);
    if (dist > JOYSTICK_LIMIT) {
        dx *= JOYSTICK_LIMIT / dist;
        dy *= JOYSTICK_LIMIT / dist;
    }
    
    joyHandle.style.transform = `translate(${dx}px, ${dy}px)`;
    droneV.x = dx * SPEED_MULTIPLIER; 
    droneV.y = dy * SPEED_MULTIPLIER;
    
    if (gui.viewMode.value !== 'drone') gui.viewMode.value = 'drone';
};

joyArea.addEventListener('mousedown', startDrag);
joyArea.addEventListener('touchstart', startDrag, {passive: false});
window.addEventListener('mousemove', handleDrag);
window.addEventListener('touchmove', (e) => {
    if (isDragging) e.preventDefault(); // 防止滾動頁面
    handleDrag(e);
}, {passive: false});
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('touchend', () => isDragging = false);

document.getElementById('lockA').onclick = function() {
    syncTarget = (syncTarget === 'A') ? null : 'A';
    this.classList.toggle('active');
    document.getElementById('lockB').classList.remove('active');
    if(syncTarget === 'A') gui.viewMode.value = 'drone';
};

document.getElementById('lockB').onclick = function() {
    syncTarget = (syncTarget === 'B') ? null : 'B';
    this.classList.toggle('active');
    document.getElementById('lockA').classList.remove('active');
    if(syncTarget === 'B') gui.viewMode.value = 'drone';
};

document.getElementById('zoomIn').onclick = () => zoom *= 1.2;
document.getElementById('zoomOut').onclick = () => zoom /= 1.2;

function drawArrow(x, y, vx, vy, color) {
    const s = 1.2; 
    const head = 8 / zoom;
    const tx = x + vx * s;
    const ty = y + vy * s;
    const angle = Math.atan2(vy, vx);

    ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(tx, ty);
    ctx.strokeStyle = color; ctx.lineWidth = 2 / zoom; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tx, ty);
    ctx.lineTo(tx - head * Math.cos(angle - 0.5), ty - head * Math.sin(angle - 0.5));
    ctx.lineTo(tx - head * Math.cos(angle + 0.5), ty - head * Math.sin(angle + 0.5));
    ctx.closePath(); ctx.fillStyle = color; ctx.fill();
}

function animate() {
    const ts = parseFloat(gui.timeScale.value) || 0;
    const dt = 0.016 * ts;
    pA.update(dt);
    pB.update(dt);

    const mode = gui.viewMode.value;
    modeTag.innerText = `觀察模式：${gui.viewMode.options[gui.viewMode.selectedIndex].text}`;

    if (syncTarget === 'A') {
        droneV = { ...pA.vel };
        dronePos = { ...pA.pos };
        updateJoystickUI(droneV.x, droneV.y);
    } else if (syncTarget === 'B') {
        droneV = { ...pB.vel };
        dronePos = { ...pB.pos };
        updateJoystickUI(droneV.x, droneV.y);
    } else if (mode === 'drone') {
        dronePos.x += droneV.x * dt;
        dronePos.y += droneV.y * dt;
    } else {
        dronePos = { x: 0, y: 0 };
        droneV = { x: 0, y: 0 };
        if (!isDragging) updateJoystickUI(0, 0);
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.scale(zoom, zoom);
    ctx.translate(-dronePos.x, -dronePos.y);

    // 網格
    ctx.beginPath(); ctx.strokeStyle = '#222'; ctx.lineWidth = 1/zoom;
    for(let i = -10000; i <= 10000; i += 100) {
        ctx.moveTo(i, -10000); ctx.lineTo(i, 10000);
        ctx.moveTo(-10000, i); ctx.lineTo(10000, i);
    }
    ctx.stroke();

    // 軌跡
    const renderPath = (p) => {
        if (p.path.length < 2) return;
        ctx.beginPath(); ctx.strokeStyle = p.color + "77"; ctx.lineWidth = 2/zoom;
        for(let i = 0; i < p.path.length; i++) {
            let pt = p.path[i];
            let dx = pt.x, dy = pt.y;
            if (syncTarget === 'A') {
                let ref = pA.path[i] || pA.pos;
                dx = (pt.x - ref.x) + dronePos.x;
                dy = (pt.y - ref.y) + dronePos.y;
            } else if (syncTarget === 'B') {
                let ref = pB.path[i] || pB.pos;
                dx = (pt.x - ref.x) + dronePos.x;
                dy = (pt.y - ref.y) + dronePos.y;
            } else if (mode === 'drone') {
                dx = (pt.x - droneV.x * pt.t) + dronePos.x;
                dy = (pt.y - droneV.y * pt.t) + dronePos.y;
            }
            if(i === 0) ctx.moveTo(dx, dy); else ctx.lineTo(dx, dy);
        }
        ctx.stroke();
    };
    renderPath(pA); renderPath(pB);

    // 質點
    const renderObj = (p) => {
        let x = p.pos.x, y = p.pos.y;
        let relVX = p.vel.x - droneV.x, relVY = p.vel.y - droneV.y;
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(x, y, 8/zoom, 0, Math.PI*2); ctx.fill();
        if (Math.hypot(relVX, relVY) > 0.1) drawArrow(x, y, relVX, relVY, p.color);
    };
    renderObj(pA); renderObj(pB);

    ctx.restore();
    requestAnimationFrame(animate);
}

gui.resetBtn.onclick = () => {
    pA.reset(); pB.reset();
    dronePos = { x: 0, y: 0 }; droneV = { x: 0, y: 0 };
    syncTarget = null;
    document.querySelectorAll('.deck-btn').forEach(b => b.classList.remove('active'));
};

window.onresize = () => {
    const sidebarWidth = window.innerWidth > 768 ? 320 : 250;
    canvas.width = window.innerWidth - sidebarWidth;
    canvas.height = window.innerHeight;
};

window.onresize();
animate();
</script>
</body>
</html>
