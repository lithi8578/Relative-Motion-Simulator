<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>物理觀察模擬器 - iPad 優化</title>
    <style>
        :root {
            --panel-bg: #121212;
            --accent: #00d4ff;
            --danger: #ff4757;
            --text: #ffffff;
            --btn-bg: #2f3542;
        }
        * { 
            touch-action: manipulation; 
            box-sizing: border-box; 
            -webkit-user-select: none; /* 防止 iPad 長按選取文字 */
        }
        body { 
            margin: 0; 
            display: flex; 
            font-family: -apple-system, system-ui, sans-serif; 
            background: #000; 
            color: var(--text); 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
        }
        
        /* 側邊欄：增加滾動條與安全區域間距 */
        #sidebar { 
            width: 220px; 
            padding: 15px; 
            padding-bottom: env(safe-area-inset-bottom);
            background: var(--panel-bg); 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            border-right: 1px solid #333; 
            z-index: 10;
            overflow-y: auto; 
            font-size: 13px;
            flex-shrink: 0;
        }

        #resetBtn { 
            width: 100%; 
            padding: 12px; 
            cursor: pointer; 
            border-radius: 10px; 
            border: none; 
            font-size: 14px; 
            font-weight: bold; 
            background: var(--danger); 
            color: white; 
            margin-bottom: 15px; 
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
        }
        #resetBtn:active { transform: scale(0.95); opacity: 0.9; }

        .group { border: 1px solid #333; padding: 10px; margin-bottom: 10px; border-radius: 8px; background: #1a1a1a; }
        h3 { margin: 0 0 8px 0; color: var(--accent); font-size: 12px; border-bottom: 1px solid #333; padding-bottom: 4px; font-weight: 600; }
        
        .input-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        label { font-size: 11px; color: #888; }
        
        input[type="number"] { 
            width: 45px; background: #000; border: 1px solid #444; color: var(--accent); 
            padding: 4px; border-radius: 4px; font-family: monospace; font-size: 12px; text-align: center;
        }
        
        select { 
            width: 100%; padding: 10px; border-radius: 8px; border: none; 
            font-size: 13px; background: var(--btn-bg); color: white; margin-bottom: 15px; 
            appearance: none;
        }

        #viewport { 
            position: relative; 
            flex-grow: 1; 
            height: 100%;
            overflow: hidden; 
            background: #050505; 
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* 飛行控制面板：使用 fixed 定位確保完全顯示在右下角 */
        #flight-deck {
            position: fixed; 
            bottom: max(15px, env(safe-area-inset-bottom));
            right: max(15px, env(safe-area-inset-right));
            width: 140px; 
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(0, 212, 255, 0.4); 
            border-radius: 20px;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            padding: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            backdrop-filter: blur(15px); 
            user-select: none;
            z-index: 20;
            max-height: 90vh;
            overflow-y: auto;
        }
        .deck-section { width: 100%; display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; }
        .joystick-area {
            width: 80px; height: 80px; background: rgba(0,0,0,0.6); border-radius: 50%;
            border: 1px solid #444; position: relative; display: flex; align-items: center; justify-content: center;
            touch-action: none;
        }
        .joystick-handle {
            width: 30px; height: 30px; background: radial-gradient(circle at 30% 30%, var(--accent), #0088aa);
            border-radius: 50%; box-shadow: 0 0 15px rgba(0, 212, 255, 0.6); position: relative; z-index: 2;
        }
        .deck-row { display: flex; width: 100%; justify-content: space-between; gap: 6px; }
        .deck-btn {
            flex: 1; height: 32px; background: #2a2a2a; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 11px; font-weight: bold; color: #fff; border: 1px solid #444;
        }
        .deck-btn.active { background: var(--accent); color: #000; border-color: #fff; }
        .deck-label { font-size: 10px; color: var(--accent); margin-bottom: 5px; font-weight: bold; opacity: 0.9; text-transform: uppercase; }

        #mode-tag {
            position: absolute; top: 15px; left: 15px;
            background: rgba(0,0,0,0.6); padding: 6px 15px;
            border-radius: 15px; border: 1px solid rgba(0, 212, 255, 0.3);
            font-size: 12px; color: #fff; pointer-events: none; z-index: 15;
        }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="color: var(--accent); margin-bottom: 12px; border: none; font-size: 16px;">控制中心</h3>
    
    <button id="resetBtn">重置物理系統</button>
    
    <label style="margin-bottom: 5px; display: block;">觀察視角模式</label>
    <select id="viewMode">
        <option value="absolute">絕對座標系</option>
        <option value="drone">自定義空拍模式</option>
    </select>

    <div class="input-row">
        <label>模擬速度 (dt)</label>
        <input type="number" id="timeScale" value="1.0" step="0.1">
    </div>

    <div class="group">
        <h3 style="color: #ff4757;">質點 A (RED)</h3>
        <div class="input-row"><label>位置 X, Y</label><span><input type="number" id="ax" value="-300"><input type="number" id="ay" value="0"></span></div>
        <div class="input-row"><label>速度 Vx, Vy</label><span><input type="number" id="avx" value="20"><input type="number" id="avy" value="0"></span></div>
        <div class="input-row"><label>加速 Ax, Ay</label><span><input type="number" id="aax" value="-3"><input type="number" id="aay" value="0"></span></div>
    </div>

    <div class="group">
        <h3 style="color: #2ed573;">質點 B (GREEN)</h3>
        <div class="input-row"><label>位置 X, Y</label><span><input type="number" id="bx" value="100"><input type="number" id="by" value="0"></span></div>
        <div class="input-row"><label>速度 Vx, Vy</label><span><input type="number" id="bvx" value="-20"><input type="number" id="bvy" value="0"></span></div>
        <div class="input-row"><label>加速 Ax, Ay</label><span><input type="number" id="bax" value="3"><input type="number" id="bay" value="0"></span></div>
    </div>
</div>

<div id="viewport">
    <div id="mode-tag">模式：地面固定座標系</div>
    <canvas id="canvas"></canvas>

    <div id="flight-deck">
        <div class="deck-section">
            <span class="deck-label">Manual Pilot</span>
            <div class="joystick-area" id="joyArea">
                <div class="joystick-handle" id="joyHandle"></div>
            </div>
        </div>
        <div class="deck-section">
            <span class="deck-label">Target Lock</span>
            <div class="deck-row">
                <div class="deck-btn" id="lockA">Lock A</div>
                <div class="deck-btn" id="lockB">Lock B</div>
            </div>
        </div>
        <div class="deck-section" style="margin-bottom: 0;">
            <div class="deck-row">
                <div class="deck-btn" id="zoomOut">−</div>
                <div class="deck-btn" id="zoomIn">+</div>
            </div>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const gui = {};
const ids = ['ax','ay','avx','avy','aax','aay','bx','by','bvx','bvy','bax','bay','timeScale','viewMode','resetBtn'];
ids.forEach(id => gui[id] = document.getElementById(id));

let zoom = 0.8;
let droneV = { x: 0, y: 0 };
let dronePos = { x: 0, y: 0 };
let isDragging = false;
let syncTarget = null;
let dynamicSpeedMultiplier = 7; // 動態速度倍率

// 常數設定
const MIN_SPEED_MULTIPLIER = 5;  // 最小倍率（質點停止時）
const MAX_SPEED_MULTIPLIER = 50; // 最大倍率（高速運動時）
const JOYSTICK_LIMIT = 32;
const GRID_SIZE = 50;  // 網格大小
const GRID_MAJOR_INTERVAL = 5;  // 主網格線間隔（5個網格）

class Particle {
    constructor(color, prefix) {
        this.color = color;
        this.prefix = prefix;
        this.reset();
    }
    reset() {
        this.p0 = { x: parseFloat(gui[this.prefix+'x'].value)||0, y: parseFloat(gui[this.prefix+'y'].value)||0 };
        this.v0 = { x: parseFloat(gui[this.prefix+'vx'].value)||0, y: parseFloat(gui[this.prefix+'vy'].value)||0 };
        this.acc = { x: parseFloat(gui[this.prefix+'ax'].value)||0, y: parseFloat(gui[this.prefix+'ay'].value)||0 };
        this.pos = { ...this.p0 };
        this.vel = { ...this.v0 };
        this.path = [];
        this.t = 0;
    }
    update(dt) {
        this.t += dt;
        this.pos.x = this.p0.x + this.v0.x * this.t + 0.5 * this.acc.x * this.t**2;
        this.pos.y = this.p0.y + this.v0.y * this.t + 0.5 * this.acc.y * this.t**2;
        this.vel.x = this.v0.x + this.acc.x * this.t;
        this.vel.y = this.v0.y + this.acc.y * this.t;
        this.path.push({ x: this.pos.x, y: this.pos.y, t: this.t });
        if (this.path.length > 1500) this.path.shift();
    }
    // 取得速度大小（量級）
    getSpeedMagnitude() {
        return Math.hypot(this.vel.x, this.vel.y);
    }
}

let pA = new Particle('#ff4757', 'a');
let pB = new Particle('#2ed573', 'b');

const joyHandle = document.getElementById('joyHandle');
const joyArea = document.getElementById('joyArea');

/**
 * 動態計算速度倍率
 * 使無人機最高速度 = 質點中速度最快的量級
 */
function calculateDynamicSpeedMultiplier() {
    const speedA = pA.getSpeedMagnitude();
    const speedB = pB.getSpeedMagnitude();
    const maxParticleSpeed = Math.max(speedA, speedB);
    
    // 根據質點最高速度計算倍率
    // 公式：倍率 = maxParticleSpeed / (JOYSTICK_LIMIT / UI顯示時間常數)
    // 簡化為：直接使用 maxParticleSpeed 作為倍率基礎
    const baseMultiplier = Math.max(maxParticleSpeed, MIN_SPEED_MULTIPLIER);
    dynamicSpeedMultiplier = Math.min(baseMultiplier, MAX_SPEED_MULTIPLIER);
    
    return dynamicSpeedMultiplier;
}

function updateJoystickUI(vx, vy) {
    let dx = vx / dynamicSpeedMultiplier;
    let dy = vy / dynamicSpeedMultiplier;
    const dist = Math.hypot(dx, dy);
    if (dist > JOYSTICK_LIMIT) {
        dx *= JOYSTICK_LIMIT / dist;
        dy *= JOYSTICK_LIMIT / dist;
    }
    joyHandle.style.transform = `translate(${dx}px, ${dy}px)`;
}

const handleDrag = (e) => {
    if (!isDragging) return;
    const rect = joyArea.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    let dx = clientX - centerX;
    let dy = clientY - centerY;
    const dist = Math.hypot(dx, dy);
    if (dist > JOYSTICK_LIMIT) {
        dx *= JOYSTICK_LIMIT / dist;
        dy *= JOYSTICK_LIMIT / dist;
    }
    joyHandle.style.transform = `translate(${dx}px, ${dy}px)`;
    droneV.x = dx * dynamicSpeedMultiplier; 
    droneV.y = dy * dynamicSpeedMultiplier;
    if (gui.viewMode.value !== 'drone') gui.viewMode.value = 'drone';
};

joyArea.addEventListener('mousedown', (e) => { isDragging = true; syncTarget = null; document.querySelectorAll('.deck-btn').forEach(b => b.classList.remove('active')); handleDrag(e); });
joyArea.addEventListener('touchstart', (e) => { isDragging = true; syncTarget = null; document.querySelectorAll('.deck-btn').forEach(b => b.classList.remove('active')); handleDrag(e); }, {passive: false});
window.addEventListener('mousemove', handleDrag);
window.addEventListener('touchmove', (e) => { if (isDragging) { e.preventDefault(); handleDrag(e); } }, {passive: false});
window.addEventListener('mouseup', () => isDragging = false);
window.addEventListener('touchend', () => isDragging = false);

document.getElementById('lockA').onclick = function() {
    syncTarget = (syncTarget === 'A') ? null : 'A';
    this.classList.toggle('active');
    document.getElementById('lockB').classList.remove('active');
    if(syncTarget === 'A') gui.viewMode.value = 'drone';
};
document.getElementById('lockB').onclick = function() {
    syncTarget = (syncTarget === 'B') ? null : 'B';
    this.classList.toggle('active');
    document.getElementById('lockA').classList.remove('active');
    if(syncTarget === 'B') gui.viewMode.value = 'drone';
};
document.getElementById('zoomIn').onclick = () => zoom *= 1.2;
document.getElementById('zoomOut').onclick = () => zoom /= 1.2;

/**
 * 繪製網格地面和坐標軸
 * X軸正方向向右，Y軸正方向向上（標準數學座標系）
 */
function drawGrid(camX, camY) {
    ctx.save();
    
    const majorGridSize = GRID_SIZE * GRID_MAJOR_INTERVAL;
    const viewW = canvas.width / zoom;
    const viewH = canvas.height / zoom;
    
    // 計算視窗範圍
    const startX = Math.floor((camX - viewW/2) / GRID_SIZE) * GRID_SIZE;
    const endX = Math.ceil((camX + viewW/2) / GRID_SIZE) * GRID_SIZE;
    const startY = Math.floor((camY - viewH/2) / GRID_SIZE) * GRID_SIZE;
    const endY = Math.ceil((camY + viewH/2) / GRID_SIZE) * GRID_SIZE;

    // ========== 繪製細網格（背景網格）==========
    ctx.beginPath();
    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 1 / zoom;
    
    // 垂直網格線（X軸方向）
    for (let x = startX; x <= endX; x += GRID_SIZE) {
        ctx.moveTo(x, startY);
        ctx.lineTo(x, endY);
    }
    // 水平網格線（Y軸方向）
    for (let y = startY; y <= endY; y += GRID_SIZE) {
        ctx.moveTo(startX, y);
        ctx.lineTo(endX, y);
    }
    ctx.stroke();

    // ========== 繪製主網格線 ==========
    ctx.beginPath();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2 / zoom;
    
    // 主網格 - 垂直線
    for (let x = Math.floor(startX / majorGridSize) * majorGridSize; x <= endX; x += majorGridSize) {
        ctx.moveTo(x, startY);
        ctx.lineTo(x, endY);
    }
    // 主網格 - 水平線
    for (let y = Math.floor(startY / majorGridSize) * majorGridSize; y <= endY; y += majorGridSize) {
        ctx.moveTo(startX, y);
        ctx.lineTo(endX, y);
    }
    ctx.stroke();

    // ========== 繪製坐標軸 ==========
    ctx.beginPath();
    ctx.strokeStyle = '#00ff00';  // Y軸綠色
    ctx.lineWidth = 2.5 / zoom;
    ctx.moveTo(0, startY);
    ctx.lineTo(0, endY);
    ctx.stroke();

    ctx.beginPath();
    ctx.strokeStyle = '#ff0000';  // X軸紅色
    ctx.lineWidth = 2.5 / zoom;
    ctx.moveTo(startX, 0);
    ctx.lineTo(endX, 0);
    ctx.stroke();

    // ========== 繪製坐標軸箭頭 ==========
    const arrowSize = 15 / zoom;
    
    // X軸箭頭（向右）
    const xArrowX = Math.min(endX - arrowSize * 2, camX + viewW / 2 - arrowSize * 3);
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.moveTo(xArrowX, 0);
    ctx.lineTo(xArrowX - arrowSize, -arrowSize * 0.6);
    ctx.lineTo(xArrowX - arrowSize, arrowSize * 0.6);
    ctx.closePath();
    ctx.fill();

    // Y軸箭頭（向上）
    const yArrowY = Math.min(endY - arrowSize * 2, camY + viewH / 2 - arrowSize * 3);
    ctx.fillStyle = '#00ff00';
    ctx.beginPath();
    ctx.moveTo(0, yArrowY);
    ctx.lineTo(-arrowSize * 0.6, yArrowY - arrowSize);
    ctx.lineTo(arrowSize * 0.6, yArrowY - arrowSize);
    ctx.closePath();
    ctx.fill();

    // ========== 繪製軸標籤 ==========
    ctx.fillStyle = '#fff';
    ctx.font = `${14 / zoom}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    ctx.fillText('X', xArrowX + arrowSize * 1.5, -arrowSize * 1.2);
    ctx.fillText('Y', arrowSize * 1.2, yArrowY + arrowSize * 1.5);

    ctx.restore();
}

function animate() {
    const ts = parseFloat(gui.timeScale.value) || 0;
    const dt = 0.016 * ts;
    pA.update(dt); pB.update(dt);

    // 每幀更新動態速度倍率
    calculateDynamicSpeedMultiplier();

    if (syncTarget === 'A') {
        droneV = { ...pA.vel }; dronePos = { ...pA.pos };
        updateJoystickUI(droneV.x, droneV.y);
    } else if (syncTarget === 'B') {
        droneV = { ...pB.vel }; dronePos = { ...pB.pos };
        updateJoystickUI(droneV.x, droneV.y);
    } else if (gui.viewMode.value === 'drone') {
        dronePos.x += droneV.x * dt;
        dronePos.y += droneV.y * dt;
    } else {
        dronePos = { x: 0, y: 0 }; droneV = { x: 0, y: 0 };
        if (!isDragging) updateJoystickUI(0, 0);
    }

    document.getElementById('mode-tag').innerText = `模式：${gui.viewMode.options[gui.viewMode.selectedIndex].text}`;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.scale(zoom, zoom);
    ctx.translate(-dronePos.x, -dronePos.y);

    drawGrid(dronePos.x, dronePos.y);

    const renderObject = (p) => {
        if (p.path.length > 2) {
            ctx.beginPath(); ctx.strokeStyle = p.color + "55"; ctx.lineWidth = 3/zoom;
            for(let i = 0; i < p.path.length; i++) {
                let n = p.path[i];
                let dx = n.x, dy = n.y;
                if (syncTarget === 'A') { dx = (n.x - pA.path[i].x) + dronePos.x; dy = (n.y - pA.path[i].y) + dronePos.y; }
                else if (syncTarget === 'B') { dx = (n.x - pB.path[i].x) + dronePos.x; dy = (n.y - pB.path[i].y) + dronePos.y; }
                else if (gui.viewMode.value === 'drone' && !syncTarget) { dx = (n.x - droneV.x * n.t) + dronePos.x; dy = (n.y - droneV.y * n.t) + dronePos.y; }
                if(i === 0) ctx.moveTo(dx, dy); else ctx.lineTo(dx, dy);
            }
            ctx.stroke();
        }
        
        // 質點本體
        ctx.save();
        ctx.shadowBlur = 10; ctx.shadowColor = p.color;
        ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.pos.x, p.pos.y, 10/zoom, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        // 相對速度向量 (相對於目前觀察者/無人機)
        let rvX = p.vel.x - droneV.x, rvY = p.vel.y - droneV.y;
        if (Math.hypot(rvX, rvY) > 0.5) {
            const h = 10/zoom, tx = p.pos.x + rvX*1.2, ty = p.pos.y + rvY*1.2, ang = Math.atan2(rvY, rvX);
            ctx.beginPath(); ctx.moveTo(p.pos.x, p.pos.y); ctx.lineTo(tx, ty);
            ctx.strokeStyle = p.color; ctx.lineWidth = 3/zoom; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(tx, ty);
            ctx.lineTo(tx - h*Math.cos(ang-0.4), ty - h*Math.sin(ang-0.4));
            ctx.lineTo(tx - h*Math.cos(ang+0.4), ty - h*Math.sin(ang+0.4));
            ctx.closePath(); ctx.fill();
        }
    };

    renderObject(pA); renderObject(pB);
    ctx.restore();
    requestAnimationFrame(animate);
}

gui.resetBtn.onclick = () => {
    pA.reset(); pB.reset();
    dronePos = { x: 0, y: 0 }; droneV = { x: 0, y: 0 };
    syncTarget = null;
    document.querySelectorAll('.deck-btn').forEach(b => b.classList.remove('active'));
    updateJoystickUI(0, 0);
    calculateDynamicSpeedMultiplier();
};

window.onresize = () => {
    canvas.width = window.innerWidth - 220;
    canvas.height = window.innerHeight;
};
window.onresize();
animate();
</script>
</body>
</html>
